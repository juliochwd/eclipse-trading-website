<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Eclipse Delta Trading - Riwayat Trade dengan filter lengkap">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.firebaseio.com https://*.firebaseapp.com https://*.googleapis.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' https://www.gstatic.com https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;">
    <title>Trade History - Eclipse Delta</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <i class="fas fa-chart-line"></i>
                <span>ECLIPSE</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Overview</span></a>
            <a href="trades.html" class="nav-item active"><i class="fas fa-exchange-alt"></i><span>Trades</span></a>
            <a href="signals.html" class="nav-item"><i class="fas fa-signal"></i><span>Signals</span></a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Analytics</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="nav-item" id="dashboard-logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false"><i class="fas fa-bars"></i></button>
                <h1 class="page-title">Trade History</h1>
            </div>
            <div class="header-right">
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name user-display-name">Loading...</span>
                        <span class="user-role user-display-role">Trader</span>
                    </div>
                    <div class="avatar user-avatar">--</div>
                </div>
            </div>
        </header>

        <div class="dashboard-body">
            <!-- Filters -->
            <div class="panel" style="margin-bottom:1.5rem;">
                <div class="panel-header">
                    <h2 class="panel-title"><i class="fas fa-filter"></i> Filter Trades</h2>
                    <button id="reset-filters-btn" class="btn btn-outline" style="padding:0.4rem 1rem;font-size:0.8rem;">Reset</button>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-top:1rem;">
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:0.35rem;">Asset</label>
                        <select id="filter-asset" class="filter-select">
                            <option value="">Semua Asset</option>
                            <option value="MNQ">MNQ</option>
                            <option value="MES">MES</option>
                            <option value="MGC">MGC</option>
                            <option value="CL">CL</option>
                            <option value="6J">6J</option>
                            <option value="M6A">M6A</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:0.35rem;">Arah</label>
                        <select id="filter-direction" class="filter-select">
                            <option value="">Semua</option>
                            <option value="BUY">BUY</option>
                            <option value="SELL">SELL</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:0.35rem;">Hasil</label>
                        <select id="filter-result" class="filter-select">
                            <option value="">Semua</option>
                            <option value="WIN">WIN</option>
                            <option value="LOSS">LOSS</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:0.35rem;">Dari Tanggal</label>
                        <input type="date" id="filter-date-from" class="filter-select">
                    </div>
                    <div>
                        <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:0.35rem;">Sampai Tanggal</label>
                        <input type="date" id="filter-date-to" class="filter-select">
                    </div>
                    <div style="display:flex;align-items:flex-end;">
                        <button id="apply-filters-btn" class="btn btn-primary" style="padding:0.5rem 1.2rem;font-size:0.85rem;width:100%;">
                            <i class="fas fa-search"></i> Cari
                        </button>
                    </div>
                </div>
            </div>

            <!-- Summary Row -->
            <div class="overview-cards" style="margin-bottom:1.5rem;" id="trade-summary">
                <div class="stat-card"><div class="stat-header"><span>Total Trades</span><div class="stat-icon primary"><i class="fas fa-list"></i></div></div><div class="stat-value" id="summary-total">60</div></div>
                <div class="stat-card"><div class="stat-header"><span>Win Rate</span><div class="stat-icon success"><i class="fas fa-percentage"></i></div></div><div class="stat-value" id="summary-winrate">61.7%</div></div>
                <div class="stat-card"><div class="stat-header"><span>Total P&L</span><div class="stat-icon info"><i class="fas fa-dollar-sign"></i></div></div><div class="stat-value" id="summary-pnl" style="color:var(--success-color)">+$15,011</div></div>
                <div class="stat-card"><div class="stat-header"><span>Avg per Trade</span><div class="stat-icon warning"><i class="fas fa-chart-bar"></i></div></div><div class="stat-value" id="summary-avg">+$250</div></div>
            </div>

            <!-- Trades Table -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">Riwayat Trade</h2>
                    <button id="export-csv-btn" class="btn btn-outline" style="padding:0.4rem 1rem;font-size:0.8rem;">
                        <i class="fas fa-download"></i> Export CSV
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="trades-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Tanggal</th>
                                <th>Asset</th>
                                <th>Arah</th>
                                <th>Entry</th>
                                <th>Exit</th>
                                <th>Qty</th>
                                <th>P&L</th>
                                <th>Hasil</th>
                                <th>Durasi</th>
                            </tr>
                        </thead>
                        <tbody id="trades-body">
                            <tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--text-secondary);"><i class="fas fa-spinner fa-spin"></i> Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div id="pagination" style="display:flex;justify-content:center;align-items:center;gap:0.5rem;margin-top:1.5rem;"></div>
            </div>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/dashboard.js"></script>
<script>
// Generate mock trade data
const TRADES = (() => {
    const assets = ['MNQ','MES','MGC','CL','6J','M6A'];
    const dirs = ['BUY','SELL'];
    const trades = [];
    let cumPnl = 0;
    const startDate = new Date('2025-08-01');
    for (let i = 0; i < 60; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + Math.floor(i * 3.5));
        const asset = assets[i % assets.length];
        const dir = dirs[i % 2];
        const isWin = Math.random() < 0.617;
        const pnl = isWin ? +(Math.random() * 400 + 50).toFixed(2) : -(Math.random() * 300 + 30).toFixed(2);
        cumPnl += pnl;
        const entry = +(Math.random() * 1000 + 100).toFixed(2);
        const ticks = isWin ? +(Math.random() * 50 + 5).toFixed(2) : -(Math.random() * 40 + 5).toFixed(2);
        const exit = +(entry + (dir === 'BUY' ? ticks : -ticks)).toFixed(2);
        const dur = Math.floor(Math.random() * 240 + 15);
        trades.push({ id: i+1, date: d.toLocaleDateString('id-ID'), rawDate: d, asset, dir, entry, exit, qty: 1, pnl, result: isWin ? 'WIN' : 'LOSS', duration: `${dur}m` });
    }
    return trades.reverse();
})();

let filteredTrades = [...TRADES];
let currentPage = 1;
const PAGE_SIZE = 15;

function renderTable() {
    const tbody = document.getElementById('trades-body');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = filteredTrades.slice(start, start + PAGE_SIZE);

    if (page.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--text-secondary);">Tidak ada trade ditemukan</td></tr>';
        return;
    }

    tbody.innerHTML = page.map(t => `
        <tr>
            <td style="color:var(--text-muted)">#${t.id}</td>
            <td>${t.date}</td>
            <td><strong>${t.asset}</strong></td>
            <td><span class="status-badge ${t.dir.toLowerCase()}">${t.dir}</span></td>
            <td>${t.entry}</td>
            <td>${t.exit}</td>
            <td>1</td>
            <td class="${t.pnl >= 0 ? 'text-success' : 'text-danger'} font-weight-bold">${t.pnl >= 0 ? '+' : ''}$${Math.abs(t.pnl).toFixed(2)}</td>
            <td><span class="status-badge ${t.result === 'WIN' ? 'active' : 'sell'}">${t.result}</span></td>
            <td style="color:var(--text-muted)">${t.duration}</td>
        </tr>
    `).join('');
}

function renderPagination() {
    const total = Math.ceil(filteredTrades.length / PAGE_SIZE);
    const pg = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= total; i++) {
        html += `<button onclick="goPage(${i})" style="padding:0.4rem 0.75rem;border-radius:6px;border:1px solid ${i===currentPage?'var(--primary-color)':'var(--dark-border)'};background:${i===currentPage?'var(--primary-color)':'transparent'};color:var(--text-primary);cursor:pointer;">${i}</button>`;
    }
    pg.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); renderPagination(); }

function updateSummary() {
    const wins = filteredTrades.filter(t => t.result === 'WIN').length;
    const total = filteredTrades.length;
    const pnl = filteredTrades.reduce((s, t) => s + t.pnl, 0);
    document.getElementById('summary-total').textContent = total;
    document.getElementById('summary-winrate').textContent = total ? (wins/total*100).toFixed(1)+'%' : '0%';
    document.getElementById('summary-pnl').textContent = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toFixed(0);
    document.getElementById('summary-pnl').style.color = pnl >= 0 ? 'var(--success-color)' : 'var(--danger-color)';
    document.getElementById('summary-avg').textContent = total ? (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl/total).toFixed(0) : '$0';
}

function applyFilters() {
    const asset = document.getElementById('filter-asset').value;
    const dir = document.getElementById('filter-direction').value;
    const result = document.getElementById('filter-result').value;
    const from = document.getElementById('filter-date-from').value;
    const to = document.getElementById('filter-date-to').value;

    filteredTrades = TRADES.filter(t => {
        if (asset && t.asset !== asset) return false;
        if (dir && t.dir !== dir) return false;
        if (result && t.result !== result) return false;
        if (from && t.rawDate < new Date(from)) return false;
        if (to && t.rawDate > new Date(to + 'T23:59:59')) return false;
        return true;
    });
    currentPage = 1;
    updateSummary();
    renderTable();
    renderPagination();
}

function exportCSV() {
    const headers = ['ID','Tanggal','Asset','Arah','Entry','Exit','Qty','PnL','Hasil','Durasi'];
    const rows = filteredTrades.map(t => [t.id, t.date, t.asset, t.dir, t.entry, t.exit, t.qty, t.pnl, t.result, t.duration]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'eclipse_trades.csv'; a.click();
    URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', () => {
    updateSummary();
    renderTable();
    renderPagination();
    document.getElementById('apply-filters-btn').addEventListener('click', applyFilters);
    document.getElementById('reset-filters-btn').addEventListener('click', () => {
        document.getElementById('filter-asset').value = '';
        document.getElementById('filter-direction').value = '';
        document.getElementById('filter-result').value = '';
        document.getElementById('filter-date-from').value = '';
        document.getElementById('filter-date-to').value = '';
        filteredTrades = [...TRADES];
        currentPage = 1;
        updateSummary(); renderTable(); renderPagination();
    });
    document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
});
</script>
</body>
</html>
